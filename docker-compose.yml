version: '3.9'

services:
  # ─── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: pspmanager-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: pspmanager
    volumes:
      - mongo_data:/data/db
    networks:
      - psp-network

  # ─── Zookeeper (required by Confluent Kafka) ─────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: pspmanager-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - psp-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka Broker ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: pspmanager-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listeners: INTERNAL for Docker-network traffic, EXTERNAL for host
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - psp-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Auth API (Node.js/Express) ─────────────────────────────────
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: pspmanager-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/pspmanager
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      BCRYPT_ROUNDS: 12
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      FRONTEND_URL: ${FRONTEND_URL}
      MAX_FAILED_ATTEMPTS: 5
      LOCKOUT_DURATION_MINUTES: 15
      KAFKA_BROKERS: kafka:29092
    ports:
      - "5000:5000"
    networks:
      - psp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Email Worker (Kafka consumer + SendGrid) ───────────────────
  email-worker:
    build:
      context: ./cashlabs-email-worker
      dockerfile: Dockerfile
    container_name: pspmanager-email-worker
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: email-worker-group
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      MAX_EMAIL_RETRIES: 10
    networks:
      - psp-network

  # ─── Frontend (Next.js 15) ───────────────────────────────────────
  web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: pspmanager-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:5000}
    ports:
      - "3000:3000"
    networks:
      - psp-network

volumes:
  mongo_data:
    driver: local
  zookeeper_data:
    driver: local
  zookeeper_log:
    driver: local
  kafka_data:
    driver: local

networks:
  psp-network:
    driver: bridge
