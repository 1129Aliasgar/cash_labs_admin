<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - PSPManager</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#138aec",
                        "background-paper": "#f8fafc",
                        "secure-green": "#10b981",
                        "trust-blue": "#2563eb",
                        "protect-teal": "#0d9488",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                    boxShadow: {
                        'paper': '0 1px 3px rgba(0,0,0,0.05), 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02)',
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-paper text-slate-900 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-[440px]">
<div class="bg-white rounded-2xl shadow-paper border border-slate-100 p-8 md:p-12 flex flex-col items-center">
<div class="flex flex-col items-center gap-3 mb-10">
<div class="flex items-center justify-center w-14 h-14 rounded-2xl bg-primary text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
</div>
<div class="text-center">
<h1 class="text-2xl font-black tracking-tight text-slate-900">PSPManager</h1>
<p class="text-slate-500 text-sm mt-1">Payment Service Provider Dashboard</p>
</div>
</div>
<div class="w-full">
<h2 class="text-lg font-bold text-slate-800 mb-6 text-center">Sign In</h2>
<form class="flex flex-col gap-5" onsubmit="return false;">
<div class="flex flex-col gap-1.5">
<label class="text-slate-600 text-xs font-bold uppercase tracking-wider ml-1">Email Address</label>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50/50 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary focus:bg-white transition-all placeholder:text-slate-400 text-sm" placeholder="name@company.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="text-slate-600 text-xs font-bold uppercase tracking-wider">Password</label>
<a class="text-primary text-xs font-bold hover:text-primary/80" href="#">Forgot Password?</a>
</div>
<input class="w-full h-12 px-4 rounded-xl border-slate-200 bg-slate-50/50 text-slate-900 focus:ring-4 focus:ring-primary/10 focus:border-primary focus:bg-white transition-all placeholder:text-slate-400 text-sm" placeholder="••••••••" type="password"/>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4 active:scale-[0.98]">
<span>Sign In to Dashboard</span>
</button>
</form>
<div class="mt-8 text-center border-t border-slate-50 pt-8">
<p class="text-sm text-slate-500">
                        New to PSPManager? 
                        <a class="text-primary font-bold hover:underline" href="#">Create an account</a>
</p>
</div>
</div>
</div>
<div class="mt-10 flex items-center justify-center gap-10">
<div class="flex flex-col items-center gap-2 group transition-all">
<div class="w-10 h-10 rounded-full bg-secure-green/10 flex items-center justify-center text-secure-green mb-0.5">
<span class="material-symbols-outlined text-xl">verified_user</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-secure-green">Secure</span>
</div>
<div class="flex flex-col items-center gap-2 group transition-all">
<div class="w-10 h-10 rounded-full bg-trust-blue/10 flex items-center justify-center text-trust-blue mb-0.5">
<span class="material-symbols-outlined text-xl">credit_card</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-trust-blue">PCI DSS</span>
</div>
<div class="flex flex-col items-center gap-2 group transition-all">
<div class="w-10 h-10 rounded-full bg-protect-teal/10 flex items-center justify-center text-protect-teal mb-0.5">
<span class="material-symbols-outlined text-xl">shield</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-protect-teal">Encrypted</span>
</div>
</div>
</div>

</body></html>
